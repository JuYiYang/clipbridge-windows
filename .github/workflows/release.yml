name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Generate Windows resources
        shell: pwsh
        run: |
          python scripts/generate_windows_resources.py
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          Push-Location cmd/clipbridge-windows
          goversioninfo -64 -icon ../../assets/clipbridge.ico -o rsrc_windows_amd64.syso versioninfo.json
          Pop-Location

      - name: Test
        run: go test ./...

      - name: Build executable
        run: go build -ldflags "-H windowsgui" -o dist/clipbridge-windows.exe ./cmd/clipbridge-windows

      - name: Package executable
        shell: pwsh
        run: Compress-Archive -Path dist/clipbridge-windows.exe -DestinationPath dist/clipbridge-windows-amd64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipbridge-windows-amd64
          path: dist/clipbridge-windows-amd64.zip

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = "Continue"
          gh release view $env:TAG *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            gh release upload $env:TAG dist/clipbridge-windows-amd64.zip --clobber
          } else {
            gh release create $env:TAG dist/clipbridge-windows-amd64.zip --title $env:TAG --notes "ClipBridge Windows release."
          }

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
